services:
  - type: web
    name: military-vocab-quiz
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_DATA_DIR
        value: /opt/render/project/src/storage
      - key: SESSION_SECRET
        generateValue: true
    disk:
      name: app-data
      mountPath: /opt/render/project/src/storage
      sizeGB: 5
